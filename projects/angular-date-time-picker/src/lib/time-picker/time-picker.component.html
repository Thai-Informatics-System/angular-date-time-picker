<mat-form-field class="lib-w-full lib-time-picker {{classes}}" [appearance]="appearance">
  @if(label && label != ''){
    <mat-label>{{label}}</mat-label>
  }
  <input matInput type="text" inputmode="none" [formControl]="timeCtrl"
    [placeholder]="displayPlaceholder" class="lib-time-input" readonly
    (click)="timeCtrl.disabled ? null : openPicker($event)" />
  <button type="button" matIconSuffix mat-icon-button aria-label="Time Picker"
    (click)="timeCtrl.disabled ? null : openPicker($event)" [disabled]="timeCtrl.disabled">
    <mat-icon [class.lib-icon-disabled]="timeCtrl.disabled">schedule</mat-icon>
  </button>
  @if(hint && hint != ''){ <mat-hint>{{hint}}</mat-hint> }
  <mat-error>
    @for(v of validationMessages; track v.type){
      @if(timeCtrl.hasError(v.type) && (timeCtrl.dirty || timeCtrl.touched) && !dialogOpened){
        {{v.message}}
      }
    }
  </mat-error>
</mat-form-field>
