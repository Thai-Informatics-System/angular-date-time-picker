<section class="min-h-screen bg-gray-100 p-8">
  <div class="max-w-3xl mx-auto space-y-6">
    <h1 class="text-3xl font-bold text-gray-800 tracking-tight">
      Angular Date Time Picker
    </h1>

    <div class="bg-white rounded-xl shadow p-6 space-y-4">
      <h2 class="text-xl font-semibold text-gray-700">Date Time Picker</h2>
      <date-time-picker [timeFormat]="timeFormat" [formControl]="dateTimeFc"></date-time-picker>
      <p>Value: {{ dateTimeFc.value }}</p>
    </div>

    <div class="bg-white rounded-xl shadow p-6 space-y-4">
      <h2 class="text-xl font-semibold text-gray-700">Date Picker</h2>
      <date-picker [formControl]="dateFc"></date-picker>
      <p>Value: {{ dateFc.value }}</p>
    </div>

    <div class="bg-white rounded-xl shadow p-6 space-y-4">
      <h2 class="text-xl font-semibold text-gray-700">Time Picker</h2>
      <time-picker [timeFormat]="timeFormat" [formControl]="timeFc"></time-picker>
      <p>Value: {{ timeFc.value }}</p>
    </div>
  </div>
</section>
